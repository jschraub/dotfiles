[username]
show_always = true
style_user = "bg:mauve fg:crust"
style_root = "bg:mauve fg:crust"
format = '[ ´Çç ]($style bold)[$user ]($style)'

# 1. TIME - blue, clock icon (24h HH:MM)
[time]
disabled = false
time_format = "%R"
style = "bg:blue fg:crust"
format = '[ ´Çù ]($style bold)[$time ]($style)'

# 2. DIRECTORY - sapphire, folder icon
[directory]
style = "bg:sapphire fg:crust"
format = '[ ´ü╗ ]($style bold)[$path ]($style)'
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

# 3. GIT - green; starship can't switch bg on dirty, so $git_status carries
#    the dirty marker (the analog of the statusline's trailing ` *`)
[git_branch]
symbol = "¯éá"
style = "bg:green fg:crust"
format = '[ $symbol ]($style bold)[$branch ]($style)'

[git_status]
style = "bg:green fg:crust"
format = '[($all_status$ahead_behind )]($style)'

# 4. LANGUAGES - yellow (statusline's claude/model slot)
