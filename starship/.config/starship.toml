"$schema" = 'https://starship.rs/config-schema.json'

# Powerline prompt mirroring the Claude Code statusline:
# rounded left cap -> user -> time -> directory -> git -> languages -> docker -> rounded right cap.
# Catppuccin Mocha spectrum sweep (violet -> blue -> cyan -> green -> yellow -> warm-red),
# dark-crust text on pastel segments, bold Nerd Font icons, chevron dividers.
format = """
[¯éÂ](fg:mauve)\
$username\
[¯é░](fg:mauve bg:blue)\
$time\
[¯é░](fg:blue bg:sapphire)\
$directory\
[¯é░](fg:sapphire bg:green)\
$git_branch\
$git_status\
[¯é░](fg:green bg:yellow)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:yellow bg:maroon)\
$docker_context\
[¯é┤](fg:maroon)\
$line_break$character"""

palette = 'catppuccin_mocha'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
